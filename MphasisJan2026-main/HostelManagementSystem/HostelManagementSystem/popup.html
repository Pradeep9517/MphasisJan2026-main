<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; scrollbar-width:none; }
  *::-webkit-scrollbar { display:none; }
  body {
    width:400px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#0f0f1a; color:#ccc; display:flex; flex-direction:column;
  }
  .v1 { padding:10px 14px; border-bottom:1px solid #1e1e36; }
  .v0 { font-size:11px; margin-bottom:6px; color:#888; display:none; }
  .v0.ok, .v0.no, .v0.info { display:block; }
  textarea {
    width:100%; height:90px; background:#1a1a2e; color:#ccc;
    border:1px solid #2a2a44; border-radius:6px; padding:8px 10px;
    font-size:12px; font-family:"Consolas","Monaco","Courier New",monospace;
    resize:vertical; outline:none; tab-size:2; white-space:pre;
  }
  textarea:focus { border-color:#555; }
  .v2 { display:flex; gap:12px; margin-top:6px; }
  .v3 {
    background:none; border:none; color:#888; font-size:11px;
    cursor:pointer; padding:0; font-weight:500; font-family:inherit;
  }
  .v3:hover { color:#ccc; }
  .v3:disabled { opacity:.4; cursor:not-allowed; }
  .v4 { font-size:10px; color:#888; margin-top:4px; min-height:14px; opacity:0; transition:opacity .2s; }
  .v4.show { opacity:1; }
  .v5 { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .v6 { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#555; }
  .v7 {
    overflow-y:auto; background:#1a1a2e; border:1px solid #2a2a44;
    border-radius:6px; padding:10px; min-height:100px; max-height:240px;
    font-size:12px; line-height:1.5; color:#ccc;
    font-family:"Consolas","Monaco","Courier New",monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  .ph { color:#444; text-align:center; padding:20px 10px; font-size:11px; }
  .ld { display:flex; align-items:center; justify-content:center; gap:6px; color:#888; font-size:11px; padding:20px 10px; }
  .sp { width:12px; height:12px; border:2px solid #333; border-top-color:#888; border-radius:50%; animation:s .6s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  .v8 { margin-top:6px; height:3px; background:#2a2a44; border-radius:3px; overflow:hidden; display:none; }
  .v8.active { display:block; }
  .v8f { height:100%; width:0%; background:#888; border-radius:3px; transition:width .2s; }
  .v9 { font-size:10px; margin-top:4px; color:#888; display:none; text-align:center; }
  .v9.countdown, .v9.typing, .v9.done, .v9.error, .v9.stopped { display:block; }
</style>
</head>
<body>
  <div class="v1">
    <div class="v0" id="st"></div>
    <textarea id="ta"></textarea>
    <div class="v2">
      <button class="v3" id="ab">Process</button>
      <button class="v3" id="cb">Copy</button>
      <button class="v3" id="db">Clear</button>
    </div>
    <div class="v4" id="ms"></div>
  </div>

  <div class="v1" style="border-bottom:none">
    <div class="v5">
      <span class="v6">Result</span>
      <button class="v3" id="cr">Copy</button>
    </div>
    <div class="v7" id="rp"></div>
    <div class="v2" style="margin-top:6px">
      <button class="v3" id="tb">Type It</button>
      <button class="v3" id="sb" style="display:none">Stop</button>
    </div>
    <div class="v8" id="tp">
      <div class="v8f" id="tf"></div>
    </div>
    <div class="v9" id="ts"></div>
  </div>

<script src="popup.js"></script>
</body>
</html>
